name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            tag_prefix: linux
          - os: macos-latest
            label: Mac
            tag_prefix: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean jpackageImage --no-configuration-cache

      - name: Find and zip output
        run: |
          find . -type d -name "jpackage" 
          cd $(find . -type d -name "jpackage")
          zip -r ${{ github.workspace }}/${{ matrix.label }}-app.zip .
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag_prefix }}-${{ github.ref_name }}
          name: ${{ matrix.label }} ${{ github.ref_name }}
          files: ${{ matrix.label }}-app.zip