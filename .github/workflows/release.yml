name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
            tag_prefix: win
          - os: ubuntu-latest
            label: Linux
            tag_prefix: linux
          - os: macos-latest
            label: Mac
            tag_prefix: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean jpackageImage --no-configuration-cache

      - name: Zip output (Unix)
        if: runner.os != 'Windows'
        run: |
          DIR=$(find . -type d -name "jpackage" | head -1)
          cd "$DIR"
          zip -r ${{ github.workspace }}/${{ matrix.label }}-app.zip .
        shell: bash

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        run: |
          $dir = Get-ChildItem -Recurse -Directory -Filter "jpackage" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found jpackage at: $dir"
          Compress-Archive -Path "$dir\*" -DestinationPath "${{ matrix.label }}-app.zip"
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag_prefix }}-${{ github.ref_name }}
          name: ${{ matrix.label }} ${{ github.ref_name }}
          files: ${{ matrix.label }}-app.zip